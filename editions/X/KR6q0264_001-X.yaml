body:
  text: 天集總八十七丈臨濟序一丈二十九板藏古卷四汾陽昭六板藏古卷十瑯琊覺三板藏古卷四十六慈明圓一十二板藏古卷十一翠巖真六板黃龍南三板死心新五板晦堂心三板泐潭英二板兜率悅二板草堂清四板靈源清三板湛堂準五板長靈卓三板地集總八十七板法眼益一板雲門偃一十一板藏古卷十五至十八法昌遇五板雪竇顯四板天衣懷四板曹山寂五板投子青八板芙蓉楷六板真歇了三板宏智覺九板古巖璧八板天章楚一板真淨文一十四板藏古卷四十二隱山璨四板妙湛慧二板金粟智二板巳菴深附日集總八十七丈楊岐會四板藏古卷十九白雲端一十八板保寧勇一十三板五祖演一十二板藏古卷二十至廿二南堂興一板佛眼遠七板藏古卷廿七至卅四圓悟勤一十九板開福寧三板佛性泰四板月菴果三板復菴封三板月集總八十九丈佛心才六板山堂洵九板別峯珍九板雲蓋本六板虎丘隆二板應菴華十八板密菴傑五板松源岳九板曹源生四板鐵鞭韶四板破菴先六板笑菴悟二板晦翁明附無示諶三板心聞賁四板慈航朴二板星集總九十二丈大慧杲七板晦菴光四板此菴淨九板懶菴需一十五板佛照光八板誰菴演四板遯菴演七板竹原元四板蒙菴岳三板石菴玿六板退菴先六板混源密五板空叟印四板木菴永五板柏堂雅五板辰集總八十六丈雪堂行一十板竹菴珪八板晦菴光三板別峯印一十三板退菴奇一十板東山空七板廣鑒瑛九板水菴一三板別峯雲一十六板或菴體七板右天地日月星辰六策目錄畢續古尊宿錄目錄濃州細目鄉臨滹山大仙寺所藏享保七年壬寅之秋濃州北方邑慈溪寺享宗和尚輪住于妙心與忠交承忠預告慈溪請借大仙本七月廿六日享宗和尚親持來附余矣天集總八十七丈臨濟慧照禪師語序一丈廿九丈卷一摺題古天一至廿九汾陽昭禪師語六板同古天卅至卅五琅琊覺和尚語三板同古天卅六至卅八慈明圓禪師語十二板同古天卅九至五十翠岩真六板黃龍南三板死心新五板晦堂心三板泐潭英二板兜率悅二板草堂清和尚語四板卷一摺題古天七二至七五靈源清三板湛堂準五板長靈卓和尚語三板卷一摺題古天八四至八六長靈終題續開古尊宿語要集第一大仙本草堂長靈摺題有七十二八十四等其脫翠岩等八家明矣以八家紙數填之則能脗合摺題又長靈終題續開第一則此本亦天集盡于長靈全同心華本次南泉已下別卷也余下辯之地集南泉普願和尚語十二板全卷摺題南泉投子和尚語十四板同投子睦州和尚語十八板同睦州趙州真際語上二十板同趙上趙州真際語中十四板同趙中趙州真際語下十一板同趙下右總八十九丈鼓山本撰第一卷首山念和尚語二十板全卷摺題首山葉縣省禪師語二十一板同廣教神鼎諲禪師語十六板同神鼎承天嵩禪師語九板同承天石門慈照鳳巖集十七板同石門右總八十三丈鼓山本撰第二卷但本撰首山前有南院顒而大仙本脫又大仙本次第顛倒今依鼓山本撰目錄正之其目錄心華本天集首載今依雜華本移于正集首大仙本以葉縣石門趙州總八十三丈加天集以首山神鼎臨濟承天南泉投子睦州百十九丈題裱紙為地集蓋大仙本元失地集又天集中脫八家遂以鼓山本撰第一冊第二冊填天地之闕而已摺題亦異天集日集等可知相國本自法眼益到金粟智十六家為地集大仙本全脫大仙本自南泉願到石門聰總九家相國本全不收九家皆在今刊古尊宿錄固鼓山本撰者而非續錄不可加於續古尊宿錄也日集總八十七丈日月二集與相國本全同首題續刊古尊宿語要第三集目錄日楊岐會禪師語四板卷一摺題古日一至四白雲端和尚語十八丈同古日五至廿二保寧勇禪師語十三丈同古日廿三至卅五五祖演禪師語十二丈同古日卅六至四七南堂興和尚語一丈同古日四八佛眼遠禪師語七丈同古日四九至五五圜悟勤禪師語十九丈同古日五六至七四開福寧和尚語三丈同古日七五至七七佛性泰禪師語四丈同古日七八至八一月菴果和尚語三丈同古日八二至八四復菴封禪師語三丈同古日八五至八十七月集總八十九丈首題續刊古尊宿語要第四集目錄月佛心才和尚語六板卷一摺題古月一至六山堂洵禪師語九板同古月七至十五別峯珍禪師語九板同古月十六至廿四雲蓋本和尚語六板同古月廿五至三十虎丘隆和尚語二板同古月卅一至卅二應菴華和尚語十八板同古月卅三至五十密菴傑和尚語五板同古月五一至五五松源岳禪師語九板同古月五六至六四曹源生禪師語四板同古月六五至六八鐵鞭韶和尚語四板同古月六九至七二破菴先禪師語六板同古月七三至七八笑菴悟和尚語二板同古月七九至八十無示諶和尚語三板同古月八一至八三心聞賁和尚語四板同古月八四至八七慈航朴和尚語二板同古月八八星集總九十二丈星辰二集依大仙本寫興聖寺本闕首賾藏主云云序首題續刊古尊宿語要第五集目錄星大慧杲禪師語七板卷一摺題古星一至七晦菴光狀元語四板同古星八至十一此菴淨禪師語九板同古星十二至二十懶菴需禪師語十五板同古星廿一至卅五佛照光和尚語八板同古星卅六至四三誰菴演禪師語四板同古星四四至四七遯菴演和尚語七板同古星四八至五四竹原元菴主語四板同古星五五至五八蒙菴岳和尚語三板同古星五九至六一石菴玿和尚語六板同古星六二至六七退菴先和尚語六板同古星六八至七三混源密和尚語五板同古星七四至七八空叟印禪師語四板同古星七九至八二木菴永和尚語五板同古星八三至八七柏堂雅和尚語五板同古星八八至九二後附南泉和尚名普願云云辰集總八十六丈首序敬覧晦室老人云云首題續刊古尊宿語要第六集目錄辰雪堂行和尚語十板卷一摺題古辰一至十竹菴珪和尚語八板同古辰十一至十八晦菴光禪師語三板同古辰十九至廿一別峯印禪師語十三板同古辰廿二至卅四退菴奇禪師語十板同古辰卅五至四四東山空和尚語七板同古辰四五至五一廣鑒瑛和尚語九板同古辰五二至六十水菴一禪師語三板同古辰六一至六三別峯雲和尚語十六板同古辰六四至七九或菴體禪師語七板同古辰八十至八六尾題續開古尊宿語要集第六右大仙之本盡于此總五百八十四張相國寺心華院舊藏續古尊宿錄余甞訪芳渚和尚於大光明寺得覧之渚寂後繼席者亦亡余語京北興聖伯瑛和尚以是事瑛曰余曾就芳渚借之寫得秘珍焉余喜請之謄寫其本闕星辰二集余疑懶廢矣享保七年壬寅之冬雜華院別源座元贖獲古刊正續古尊宿錄而示余其本每卷有心華所藏之印余為之慘然其續錄闕星辰二集乃知瑛之不寫為元本脫非懶廢矣余適借濃州大仙寺本別源轉借補寫星辰二集余亦依心華本完補大仙本地集全天集半之逸者余亦以謂其正錄雖皆北藏古尊宿錄所收入然是鼓山本撰足見舊面遂借雜華本畢寫功矣於是乎雜華龍華各得古撰正續古尊宿錄豈不為奇哉豈不為快哉道忠識大仙本天地二集目錄顛倒天集百十一丈草堂清四板汾陽昭六板瑯琊覺三板慈明圓十二板長靈卓三板葉縣省廿一板石門慈照十七板趙州上二十板趙州中十四板趙州下十一枚地集百十九丈首山念二十枚神鼎諲十六板臨濟照序一丈廿九板承天嵩九板南泉願十二板投子十四板睦州十八板右龍華所藏古宿錄與鼓山舊撰本對挍者睦州在第六首山在第八石門在第九承天在第十南泉在第十二趙州在十三十四葉縣在廿三神鼎在廿四投子在卅六已上總九家在大仙續宿中龍華新寫續古宿天集全寫未得挍大仙本脫此八家翠巖真六板黃龍南三板死心新五板晦堂心三板泐潭英二板兜率悅二板靈源清三板湛堂準五板已上廿九板俟得別本挍讐龍華新寫續古宿地集寫與未寫並未挍地集未寫者雲門偃十一板雪竇顯四板曹山寂五板真歇了三板宏智覺九板真淨文十四板已上未寫者四十六板大仙本全脫地集後皆得心華本挍於未挍寫於未寫完全無所闕師諱義玄曹州南華人也俗姓邢氏幼而頴異長以孝聞及落髮受具居於講肆精究毗尼博頤經論俄而歎曰此濟世之醫方也非教外別傳之旨即更衣游方首參黃檗次謁大愚其機緣語句載于行錄既受黃檗印可尋抵河北鎮州城東南隅臨滹沱河側小院住持其臨濟因地得名時普化先在彼佯狂混眾聖凡莫測師至即佐之師正旺化普化全身脫去乃符仰山小釋迦之懸記也適丁兵革師即棄去太尉默君和於城中捨宅為寺亦以臨濟為額迎師居焉後拂衣南邁至河府府主王常侍延以師禮住未幾即來大名府興化寺居于東堂師無疾忽一日攝衣據坐與三聖問答畢寂然而逝時唐咸通八年丁亥孟陬月十日也門人以師全身建塔于大名府西北隅勅諡慧照禪師塔號澄靈合掌稽首記師大略住鎮州保壽嗣法小師延沼謹書
